name: Prepare Release
description: Prepares the release by regenerating the dev setup artifacts.

runs:
  using: composite
  steps:
    - uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
    - name: regenerate-dev-setup
      shell: bash
      run: |
        set -eu
        make generate-dev-setup
